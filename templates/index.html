<script>
const SLOT_COLORS = ['#7c3aed','#db2777','#0891b2','#d97706','#059669','#dc2626','#2563eb','#65a30d'];
const SLOT_NAMES  = ['9:00 AM','11:00 AM','2:00 PM','4:00 PM','9:00 AM Day 2','11:00 AM Day 2','2:00 PM Day 2','4:00 PM Day 2'];

let subjects = [], conflicts = [];

// ── Run Scheduler ──
async function runScheduler() {
  if (subjects.length < 2) { 
    alert('Please add at least 2 subjects!'); 
    return; 
  }

  document.getElementById('loader').style.display='block';
  document.getElementById('graphImg').style.display='none';
  document.getElementById('graphPlaceholder').style.display='none';
  switchTab('graph');

  try {
    // ✅ FIXED FETCH (WORKS ON RENDER)
    const res = await fetch("/schedule", {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ subjects, conflicts })
    });

    if (!res.ok) {
      const errText = await res.text();
      console.error("Backend error:", errText);
      alert("Backend error. Check console.");
      return;
    }

    const data = await res.json();
    renderResults(data);

  } catch (e) {
    console.error("Connection error:", e);
    alert("Cannot connect to server. Check Render deployment.");
  } finally {
    document.getElementById('loader').style.display='none';
  }
}

// ── KEEP ALL YOUR OTHER FUNCTIONS SAME ──
// addSubject(), renderResults(), etc.
// NO CHANGES REQUIRED THERE

</script>

</body>
